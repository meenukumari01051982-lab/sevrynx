<!DOCTYPE html>
<html>
<head>
    <title>SEVRYNX Shield v1 – Python Runner</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 50px;
        }
        h1, h2 { margin-bottom: 10px; }
        textarea {
            width: 80%;
            height: 150px;
            background-color: #111;
            color: #0f0;
            border: 1px solid gray;
            border-radius: 5px;
            padding: 10px;
            font-family: monospace;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            background-color: gray;
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: white; color: black; }
        #output {
            width: 80%;
            min-height: 50px;
            margin-top: 20px;
            padding: 10px;
            background-color: #111;
            color: #0f0;
            border: 1px solid gray;
            border-radius: 5px;
            text-align: left;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>SEVRYNX Shield v1</h1>
    <p>Type your Python code below:</p>

    <textarea id="codeArea" placeholder="print('Hello SEVRYNX')"></textarea><br>
    <button onclick="runPython()">Run Code</button>

    <div id="output"></div>

    <script>
        function runPython() {
            let code = document.getElementById('codeArea').value;
            try {
                // Simple eval for JS demonstration (Python simulation)
                // For real Python, backend / Brython / Skulpt needed
                let simulated = code.replace(/print\((.*)\)/g, '$1');
                document.getElementById('output').innerText = "Output: " + eval(simulated);
            } catch(e) {
                document.getElementById('output').innerText = "Error: " + e;
            }
        }
    </script>
</body>

<h1>SEVRYNX</h1>
<p>Control • Network • Safety</p>
