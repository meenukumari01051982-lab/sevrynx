<body>
    <!-- Homepage content (sirf ek baar) -->
    <h1>SEVRYNX</h1>
    <p>Control • Network • Safety</p>
    <p>Protecting Your Digital World</p>

    <hr style="margin:30px 0; border-color:gray;">

    <!-- Shield v1 tool -->
    <h2>Sevrynx Shield v1 – Problem Solver</h2>
    <input type="text" id="userInput" placeholder="Type a number" style="padding:10px; width:200px;">
    <button onclick="solveProblem()" style="padding:10px;">Solve</button>
    <p id="result" style="margin-top:20px; font-size:18px;"></p>

    <script>
        function solveProblem() {
            let val = document.getElementById('userInput').value;
            if(val === "") {
                document.getElementById('result').innerText = "Please type something!";
            } else if(isNaN(val)) {
                document.getElementById('result').innerText = "This is not a number!";
            } else {
                let res = val * 2;
                document.getElementById('result').innerText = "Result: " + res;
            }
        }
    </script>
</body>
