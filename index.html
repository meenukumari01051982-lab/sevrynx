<!DOCTYPE html>
<html>
<head>
    <title>SEVRYNX</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 50px;
        }
        h1 { font-size: 50px; margin-bottom: 10px; }
        p { font-size: 20px; color: gray; margin: 5px; }
        hr { margin: 30px 0; border-color: gray; }
        input, select, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid gray;
            text-align: center;
        }
        button {
            background-color: gray;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: white;
            color: black;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: #00ff00; /* result green */
        }
    </style>
</head>
<body>
    <!-- Homepage content -->
    <h1>SEVRYNX</h1>
    <p>Control • Network • Safety</p>
    <p>Protecting Your Digital World</p>

    <hr>

    <!-- Upgraded Shield v1 Tool -->
    <h2>Sevrynx Shield v1 – Problem Solver</h2>
    <input type="text" id="userInput" placeholder="Type a number" style="width:150px;">
    <select id="operation">
        <option value="double">Double</option>
        <option value="square">Square</option>
        <option value="half">Half</option>
    </select>
    <button onclick="solveProblem()">Solve</button>
    <p id="result"></p>

    <script>
        function solveProblem() {
            let val = document.getElementById('userInput').value;
            let op = document.getElementById('operation').value;
            let resText = "";

            if(val === "") {
                resText = "Please type a number!";
            } else if(isNaN(val)) {
                resText = "This is not a number!";
            } else {
                val = parseFloat(val);
                if(op === "double") resText = "Result: " + (val*2);
                else if(op === "square") resText = "Result: " + (val*val);
                else if(op === "half") resText = "Result: " + (val/2);
            }
            document.getElementById('result').innerText = resText;
        }
    </script>
</body>
</html>
